<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Recorridos Transporte Público – Valdivia</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="app-version" content="2026-06-18-01">

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

<!-- MarkerCluster -->
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">

<style>
html, body {
  margin: 0;
  height: 100%;
  font-family: Arial, sans-serif;
}
#map { width: 100%; height: 100%; }

/* ===== PANEL RECORRIDOS ===== */
#panel {
  position: fixed;
  top: 0; left: 0;
  width: 260px; height: 100%;
  background: #ffffff;
  padding: 12px;
  box-sizing: border-box;
  overflow-y: auto;
  box-shadow: 4px 0 12px rgba(0,0,0,0.15);
  z-index: 1000;
  transform: translateX(-100%);
  transition: transform 0.3s ease;
}
#panel.open { transform: translateX(0); }
#panel h3 { margin: 0 0 10px 0; color: #0b5ed7; }

/* ===== LISTA RECORRIDOS ===== */
#lista > div {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 4px;
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.15s;
  font-size: 14px;
}
#lista > div:hover { background: #f0f4ff; }
#lista input[type=checkbox] { cursor: pointer; accent-color: #0b5ed7; }

/* ===== BOTONES FAB ===== */
.fab {
  position: fixed;
  bottom: 16px;
  z-index: 1100;
  padding: 10px 14px;
  border: none;
  border-radius: 10px;
  font-weight: bold;
  color: #ffffff;
  cursor: pointer;
  box-shadow: 0 6px 18px rgba(0,0,0,0.35);
  transition: opacity 0.2s, transform 0.2s;
}
.fab:hover { opacity: 0.88; transform: translateY(-2px); }
#btn-recorridos { left: 16px; background: #0b5ed7; }
#btn-tarifa     { right: 16px; background: #dc3545; }

/* ===== PANEL TARIFAS ===== */
#fare-panel {
  position: fixed;
  bottom: 70px;
  right: 16px;
  width: 260px;
  background: #ffffff;
  padding: 14px;
  border-radius: 14px;
  box-shadow: 0 10px 28px rgba(0,0,0,0.35);
  transform: translateX(120%);
  transition: transform 0.3s ease;
  z-index: 1200;
}
#fare-panel.open { transform: translateX(0); }

#fare-close {
  position: absolute;
  top: 6px; right: 8px;
  border: none;
  background: none;
  font-size: 18px;
  cursor: pointer;
  color: #dc3545;
}
#fare-panel h4 { margin-top: 0; color: #dc3545; }
#fare-panel hr  { border: none; border-top: 1px solid #eee; margin: 10px 0; }
#fare-panel .fare-row { margin: 4px 0; font-size: 14px; }

/* ===== LABEL JARDÍN ===== */
.label-jardin {
  background: rgba(255,255,255,0.9);
  border-radius: 6px;
  padding: 2px 6px;
  font-size: 11px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.3);
}

/* ===== POPUP JARDÍN (tarjeta como imagen 1) ===== */
.popup-jardin {
  width: 240px;
  font-family: Arial, sans-serif;
  padding: 4px 0 0 0;
}
.popup-jardin .pj-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}
.popup-jardin .pj-icon {
  width: 44px;
  height: 44px;
  background: linear-gradient(135deg, #6a1b9a, #9c27b0);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: 22px;
  cursor: pointer;
}
.popup-jardin .pj-title {
  flex: 1;
}
.popup-jardin .pj-codigo {
  font-size: 11px;
  color: #888;
  margin-bottom: 2px;
}
.popup-jardin .pj-nombre {
  font-size: 16px;
  font-weight: bold;
  color: #1a1a2e;
  line-height: 1.2;
  cursor: pointer;
}
.popup-jardin .pj-nombre:hover { color: #6a1b9a; }
.popup-jardin .pj-badge {
  display: inline-block;
  background: #ede7f6;
  color: #6a1b9a;
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 20px;
  margin: 2px 2px 2px 0;
  font-weight: 500;
}
.popup-jardin .pj-dir {
  font-size: 12px;
  color: #555;
  margin: 8px 0 10px 0;
  display: flex;
  gap: 6px;
  align-items: flex-start;
}
.popup-jardin .pj-dir-icon { flex-shrink: 0; color: #aaa; }
.popup-jardin .pj-btn {
  display: block;
  width: 100%;
  background: #1a1a2e;
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 10px;
  font-size: 14px;
  font-weight: bold;
  cursor: pointer;
  text-align: center;
  transition: background 0.2s;
}
.popup-jardin .pj-btn:hover { background: #6a1b9a; }

/* ===== PANEL DETALLE JARDÍN (como imagen 2) ===== */
#detalle-panel {
  position: fixed;
  top: 0; right: 0;
  width: 380px;
  height: 100%;
  background: #fff;
  z-index: 2000;
  box-shadow: -6px 0 24px rgba(0,0,0,0.2);
  transform: translateX(100%);
  transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}
#detalle-panel.open { transform: translateX(0); }

.dp-close {
  position: absolute;
  top: 12px; right: 14px;
  background: none;
  border: none;
  font-size: 22px;
  cursor: pointer;
  color: #555;
  z-index: 10;
  line-height: 1;
}
.dp-close:hover { color: #dc3545; }

.dp-top {
  background: linear-gradient(135deg, #1a1a2e 0%, #6a1b9a 100%);
  padding: 28px 20px 22px 20px;
  color: #fff;
}
.dp-top-icon {
  width: 56px; height: 56px;
  background: rgba(255,255,255,0.15);
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  margin-bottom: 12px;
}
.dp-top-codigo { font-size: 12px; opacity: 0.7; margin-bottom: 4px; }
.dp-top-nombre { font-size: 22px; font-weight: bold; margin-bottom: 6px; }
.dp-top-dir { font-size: 13px; opacity: 0.85; display: flex; gap: 6px; align-items: flex-start; }

.dp-body { padding: 20px; flex: 1; }

.dp-section-title {
  font-size: 17px;
  font-weight: bold;
  color: #1a1a2e;
  margin: 0 0 14px 0;
  padding-bottom: 8px;
  border-bottom: 2px solid #f0f0f0;
}

.dp-info-row {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  margin-bottom: 10px;
  font-size: 14px;
}
.dp-info-label {
  color: #888;
  min-width: 150px;
  font-size: 13px;
  text-decoration: underline;
  text-decoration-style: dotted;
}
.dp-info-value { color: #222; flex: 1; }
.dp-info-value a { color: #0b5ed7; text-decoration: none; }
.dp-info-value a:hover { text-decoration: underline; }

.dp-badge {
  display: inline-block;
  border: 1.5px solid #f5a623;
  color: #c87f00;
  font-size: 12px;
  padding: 2px 10px;
  border-radius: 20px;
  font-weight: 500;
  margin-right: 4px;
}

.dp-niveles-section { margin-top: 24px; }
.dp-ciclo-box {
  background: #f7f7fb;
  border-radius: 10px;
  padding: 12px 14px;
  margin-bottom: 14px;
}
.dp-ciclo-title { font-size: 14px; font-weight: bold; color: #1a1a2e; }
.dp-ciclo-dates { font-size: 12px; color: #888; margin-top: 2px; }

.dp-nivel-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.dp-nivel-table th {
  text-align: left;
  color: #555;
  font-weight: 600;
  padding: 6px 4px;
  border-bottom: 1.5px solid #eee;
  font-size: 12px;
}
.dp-nivel-table td { padding: 10px 4px; border-bottom: 1px solid #f5f5f5; vertical-align: top; }
.dp-nivel-nombre { font-weight: bold; color: #1a1a2e; }
.dp-nivel-rango { font-size: 11px; color: #888; margin-top: 2px; }
.dp-capacidad-box {
  background: #f0f0f0;
  border-radius: 6px;
  text-align: center;
  padding: 4px 10px;
  font-weight: bold;
  font-size: 14px;
  display: inline-block;
  min-width: 40px;
}
.dp-vacante-si {
  background: #e8f5e9;
  color: #2e7d32;
  font-weight: bold;
  font-size: 12px;
  padding: 5px 10px;
  border-radius: 6px;
  text-align: center;
  display: inline-block;
}
.dp-vacante-no {
  background: #fce4ec;
  color: #c62828;
  font-weight: bold;
  font-size: 12px;
  padding: 5px 10px;
  border-radius: 6px;
  text-align: center;
  display: inline-block;
}

/* ===== RESPONSIVE ===== */
@media (min-width: 769px) {
  #panel { transform: translateX(0); }
  #btn-recorridos { display: none; }
  #map {
    margin-left: 260px;
    width: calc(100% - 260px);
  }
}
@media (max-width: 480px) {
  #detalle-panel { width: 100%; }
}
</style>
</head>

<body>

<!-- PANEL RECORRIDOS -->
<div id="panel">
  <h3>🚌 Recorridos</h3>
  <div id="lista">Cargando recorridos…</div>
</div>

<button id="btn-recorridos" class="fab">☰ Recorridos</button>

<!-- PANEL TARIFAS -->
<div id="fare-panel">
  <button id="fare-close">✖</button>
  <h4>
    💲 Detalle de Tarifas<br>
    <span style="font-size:13px;font-weight:normal">(desde 28/02/2026)</span>
  </h4>

  <div class="fare-row">👤 <strong>Adulto Local:</strong> $590</div>
  <div class="fare-row">👵 <strong>Adulto Mayor Local:</strong> $290</div>
  <div class="fare-row">🎓 <strong>Estudiante Local:</strong> $190</div>

  <hr>

  <div class="fare-row">☁️ <strong>Adulto Niebla:</strong> $740</div>
  <div class="fare-row">☁️👵 <strong>Adulto Mayor Niebla:</strong> $370</div>
  <div class="fare-row">☁️🎓 <strong>Estudiante Niebla:</strong> $240</div>

  <div style="margin-top:10px;font-size:12px;text-align:right;color:#666">
    Proyecto: Julio Alveal Tejos
  </div>
</div>

<button id="btn-tarifa" class="fab">💲 Valor de la micro</button>

<!-- PANEL DETALLE JARDÍN -->
<div id="detalle-panel">
  <button class="dp-close" id="dp-close-btn">✕</button>
  <div id="dp-content"></div>
</div>

<div id="map"></div>

<!-- JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>
/* ===== REFERENCIAS DOM ===== */
const elPanel       = document.getElementById('panel');
const elBtnRecorr   = document.getElementById('btn-recorridos');
const elFarePanel   = document.getElementById('fare-panel');
const elBtnTarifa   = document.getElementById('btn-tarifa');
const elFareClose   = document.getElementById('fare-close');
const elLista       = document.getElementById('lista');
const detallePanel  = document.getElementById('detalle-panel');
const dpContent     = document.getElementById('dp-content');
const dpCloseBtn    = document.getElementById('dp-close-btn');

/* ===== MAPA ===== */
const map = L.map('map', { zoomControl: false }).setView([-39.82, -73.25], 13);

L.control.zoom({ position: 'topright' }).addTo(map);

L.tileLayer(
  'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
  { subdomains: 'abcd', maxZoom: 19 }
).addTo(map);

/* ===== BOTONES FAB ===== */
elBtnRecorr.addEventListener('click', () => elPanel.classList.toggle('open'));
elBtnTarifa.addEventListener('click', () => elFarePanel.classList.toggle('open'));
elFareClose.addEventListener('click', () => elFarePanel.classList.remove('open'));
dpCloseBtn.addEventListener('click', () => detallePanel.classList.remove('open'));

/* Cerrar fare-panel al hacer click fuera */
document.addEventListener('click', (e) => {
  if (!elFarePanel.contains(e.target) && e.target !== elBtnTarifa) {
    elFarePanel.classList.remove('open');
  }
});

/* ===== RECORRIDOS ===== */
const capasRecorridos = [];

fetch('./data/index.json')
  .then(r => r.json())
  .then(routes => {
    elLista.innerHTML = '';

    routes.forEach(rt => {
      const row = document.createElement('div');

      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.id = `cb-${rt.route_short_name}`;

      const dot = document.createElement('span');
      dot.style.cssText = `
        display:inline-block;
        width:12px;height:12px;
        border-radius:50%;
        background:${rt.color || '#0b5ed7'};
        flex-shrink:0;
      `;

      const label = document.createElement('label');
      label.htmlFor = cb.id;
      label.textContent = `Micro ${rt.route_short_name}`;
      label.style.cursor = 'pointer';

      let layer = null;

      cb.addEventListener('change', () => {
        if (cb.checked) {
          fetch(`./data/${rt.archivo}`)
            .then(r => r.json())
            .then(gj => {
              layer = L.geoJSON(gj, {
                style: { color: rt.color || '#0b5ed7', weight: 4, opacity: 0.75 }
              }).addTo(map);
              capasRecorridos.push({ nombre: `Micro ${rt.route_short_name}`, layer });
            })
            .catch(() => {
              cb.checked = false;
              alert(`No se pudo cargar el recorrido ${rt.route_short_name}`);
            });
        } else if (layer) {
          map.removeLayer(layer);
          const idx = capasRecorridos.findIndex(c => c.layer === layer);
          if (idx !== -1) capasRecorridos.splice(idx, 1);
          layer = null;
        }
      });

      row.append(cb, dot, label);
      elLista.appendChild(row);
    });
  })
  .catch(() => {
    elLista.innerHTML = '<em style="color:#dc3545">Error al cargar recorridos.</em>';
  });

/* ===== DISTANCIA (punto a polilínea) ===== */
function distancia(latlng, poly) {
  let min = Infinity;
  poly.getLayers().forEach(l => {
    (l.getLatLngs ? l.getLatLngs() : []).flat(3).forEach(p => {
      min = Math.min(min, map.distance(latlng, p));
    });
  });
  return min;
}

/* ===== PANEL DETALLE JARDÍN ===== */
function abrirDetalle(j) {
  const hasVacantes = j.niveles.some(n => n.vacantes);

  const nivelesRows = j.niveles.map(n => `
    <tr>
      <td>
        <div class="dp-nivel-nombre">${n.nombre}</div>
        <div class="dp-nivel-rango">${n.rango}</div>
      </td>
      <td style="text-align:center"><span class="dp-capacidad-box">${n.capacidad}</span></td>
      <td><span class="${n.vacantes ? 'dp-vacante-si' : 'dp-vacante-no'}">${n.vacantes ? 'Hay Vacantes' : 'Sin Vacantes'}</span></td>
    </tr>
  `).join('');

  dpContent.innerHTML = `
    <div class="dp-top">
      <div class="dp-top-icon">🏠</div>
      <div class="dp-top-codigo">${j.codigo}</div>
      <div class="dp-top-nombre">${j.nombre}</div>
      <div class="dp-top-dir">
        <span style="opacity:0.6;flex-shrink:0">📍</span>
        <span>${j.direccion}</span>
      </div>
    </div>
    <div class="dp-body">
      <div class="dp-section-title">Información General</div>

      <div class="dp-info-row">
        <span class="dp-info-label">Entidad Administradora:</span>
        <span class="dp-info-value">${j.entidad}</span>
      </div>
      <div class="dp-info-row">
        <span class="dp-info-label">Teléfono:</span>
        <span class="dp-info-value"><a href="tel:${j.telefono}">${j.telefono}</a></span>
      </div>
      <div class="dp-info-row">
        <span class="dp-info-label">Director o directora:</span>
        <span class="dp-info-value">${j.directora}</span>
      </div>
      <div class="dp-info-row">
        <span class="dp-info-label">Correo Electrónico:</span>
        <span class="dp-info-value" style="word-break:break-all"><a href="mailto:${j.email}">${j.email}</a></span>
      </div>
      <div class="dp-info-row">
        <span class="dp-info-label">Horario de Atención:</span>
        <span class="dp-info-value">${j.horario}</span>
      </div>
      <div class="dp-info-row">
        <span class="dp-info-label">Modalidades:</span>
        <span class="dp-info-value"><span class="dp-badge">${j.modalidad}</span></span>
      </div>
      <div class="dp-info-row">
        <span class="dp-info-label">Programas:</span>
        <span class="dp-info-value"><span class="dp-badge">${j.programa}</span></span>
      </div>

      <div class="dp-niveles-section">
        <div class="dp-section-title">Niveles Ofrecidos</div>
        <div class="dp-ciclo-box">
          <div class="dp-ciclo-title">Ciclo 6 2026</div>
          <div class="dp-ciclo-dates">Abierto del lunes, 8 de junio de 2026 al domingo, 19 de julio de 2026</div>
        </div>
        <table class="dp-nivel-table">
          <thead>
            <tr>
              <th>Nivel</th>
              <th style="text-align:center">Capacidad</th>
              <th>Vacantes</th>
            </tr>
          </thead>
          <tbody>
            ${nivelesRows}
          </tbody>
        </table>
      </div>
    </div>
  `;

  detallePanel.classList.add('open');
}

/* ===== JARDINES + CLUSTER ===== */
const cluster = L.markerClusterGroup({ disableClusteringAtZoom: 17 });

const iconJardin = L.icon({
  iconUrl:    './icons/jardines.png',
  iconSize:   [30, 30],
  iconAnchor: [15, 28]
});

fetch('./data/jardines.json')
  .then(r => r.json())
  .then(jardines => {
    jardines.forEach(j => {
      const m = L.marker([j.lat, j.lng], { icon: iconJardin })
        .bindTooltip(j.nombre, {
          permanent:  true,
          direction:  'top',
          offset:     [0, -22],
          className:  'label-jardin'
        });

      // Popup tarjeta (imagen 1)
      const popupHtml = `
        <div class="popup-jardin">
          <div style="font-size:11px;color:#888;margin-bottom:6px;text-align:right">${j.codigo}</div>
          <div class="pj-header">
            <div class="pj-icon" onclick="window._abrirDetalle(${j.id})">🏠</div>
            <div class="pj-title">
              <div class="pj-nombre" onclick="window._abrirDetalle(${j.id})">${j.nombre}</div>
              <div style="margin-top:4px">
                <span class="pj-badge">${j.modalidad}</span>
              </div>
            </div>
          </div>
          <div class="pj-dir">
            <span class="pj-dir-icon">📍</span>
            <span>${j.direccion}</span>
          </div>
          <button class="pj-btn" onclick="window._abrirDetalle(${j.id})">Ver Ficha &rsaquo;</button>
        </div>
      `;

      m.bindPopup(popupHtml, { maxWidth: 260 });

      cluster.addLayer(m);
    });

    // Exponer función global para los botones del popup
    window._abrirDetalle = (id) => {
      const j = jardines.find(x => x.id === id);
      if (j) {
        map.closePopup();
        abrirDetalle(j);
      }
    };
  })
  .catch(() => console.warn('No se pudo cargar jardines.json'));

// Siempre mostrar jardines (sin filtro)
map.addLayer(cluster);
</script>

</body>
</html>
